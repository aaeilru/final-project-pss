services:
  app:
    build: .
    container_name: lms-app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./code:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - mongodb
      - rabbitmq
    environment:
      - DJANGO_SETTINGS_MODULE=lms.settings
      - SECRET_KEY=django-insecure-simple-lms-local-development-key
      - REDIS_URL=redis://redis:6379/1
      - MONGO_URI=mongodb://admin:password@mongodb:27017/
      - CELERY_BROKER_URL=amqp://admin:password@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/2

  db:
    image: postgres:15
    container_name: lms-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: simple_lms
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  mongodb:
    image: mongo:7
    container_name: lms-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lms-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  celery-worker:
    build: .
    container_name: lms-celery-worker
    command: celery -A lms worker -l info
    volumes:
      - ./code:/code
    depends_on:
      - app
      - redis
      - rabbitmq
      - mongodb
    environment:
      - DJANGO_SETTINGS_MODULE=lms.settings
      - SECRET_KEY=django-insecure-simple-lms-local-development-key
      - CELERY_BROKER_URL=amqp://admin:password@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
      - MONGO_URI=mongodb://admin:password@mongodb:27017/

  celery-beat:
    build: .
    container_name: lms-celery-beat
    command: celery -A lms beat -l info
    volumes:
      - ./code:/code
    depends_on:
      - celery-worker
    environment:
      - DJANGO_SETTINGS_MODULE=lms.settings
      - SECRET_KEY=django-insecure-simple-lms-local-development-key
      - CELERY_BROKER_URL=amqp://admin:password@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/2

  flower:
    build: .
    container_name: lms-flower
    command: celery -A lms flower --port=5555
    volumes:
      - ./code:/code
    ports:
      - "5555:5555"
    depends_on:
      - celery-worker
      - rabbitmq
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=lms.settings
      - SECRET_KEY=django-insecure-simple-lms-local-development-key
      - CELERY_BROKER_URL=amqp://admin:password@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/2

volumes:
  pg_data:
  redis_data:
  mongo_data:
  rabbitmq_data: