services:
  app:
    build: .
    container_name: lms-app
    command: ["./entrypoint.sh"]
    volumes:
      - ./code:/code
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
      - mongodb
      - rabbitmq
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=lms.settings
      - MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      - CELERY_BROKER_URL=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672//

  db:
    image: postgres:15
    container_name: lms-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: lms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  mongodb:
    image: mongo:7
    container_name: lms-mongodb
    ports:
      - "27017:27017"
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: lms-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  celery-worker:
    build: .
    container_name: lms-celery-worker
    command: celery -A lms worker -l info
    volumes:
      - ./code:/code
    depends_on:
      - app
      - redis
      - rabbitmq
      - mongodb
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=lms.settings
      - MONGO_URI=mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/?authSource=admin
      - CELERY_BROKER_URL=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672//

  celery-beat:
    build: .
    container_name: lms-celery-beat
    command: celery -A lms beat -l info
    volumes:
      - ./code:/code
    depends_on:
      - celery-worker
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=lms.settings
      - CELERY_BROKER_URL=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672//

  flower:
    build: .
    container_name: lms-flower
    command: celery -A lms flower --port=5555
    volumes:
      - ./code:/code
    ports:
      - "5555:5555"
    depends_on:
      - celery-worker
      - rabbitmq
      - redis
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=lms.settings
      - CELERY_BROKER_URL=amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672//

volumes:
  pg_data:
  redis_data:
  mongo_data:
  rabbitmq_data: